<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>xyui – RESPO 34</title>
    <style>
        body {
            background: #0a0a0a;
            color: #eaeaea;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }
        .box {
            font-size: 48px;
            letter-spacing: 4px;
        }
        #respo {
            margin-top: 40px;
        }
        .cmd {
            background: #222;
            color: #eaeaea;

            margin: 6px;
            cursor: pointer;
        }
        #log {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.7;
        }
        .runlink {
            position: fixed;
            bottom: 12px;
            right: 12px;
            opacity: 0.45;

            text-decoration: none;
        }
        .runlink:hover {

        }

    <div class="box">xyui</div>

    <!-- RESPO für CALC -->
    <div id="respo">
        <button class="cmd" data-cmd="Start">Start</button>
        <button class="cmd" data-cmd="Stop">Stop</button>
        <button class="cmd" data-cmd="Weiter">Weiter</button>
        <button class="cmd" data-cmd="Zurueck">Zurueck</button>
    </div>

    <!-- CALC‑Output -->
    <div id="log"></div>
